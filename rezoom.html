<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="© 2024 NINS (by JPGT). By using any of the services, it means you have agreed to any content and all content!" />
  <link rel="canonical" href="https://copyright.nins.cc/" />
  <title translate="no">nins / rezoom.sys</title>

  <style>
    :root {
      --dos-bg: #000000;
      --dos-fg: #00ff66;
      --dos-fg-soft: #66ff99;
      --dos-fg-dim: #4dbd74;
      --dos-invert-bg: #00ff66;
      --dos-invert-fg: #000000;
      --dos-border: #00ff66;
      --crt-flicker: flicker 0.15s infinite;
    }

    * { box-sizing: border-box; }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      5%   { opacity: 0.99; }
      10%  { opacity: 0.98; }
      100% { opacity: 0.99; }
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dos-bg);
      color: var(--dos-fg);
      font-family: "Courier New", Consolas, Monaco, monospace;
      text-shadow: 0 0 4px currentColor;
      min-height: 100%;
    }

    /* 掃描線特效 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 9999;
      opacity: 0.18;
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      border: 2px solid var(--dos-border);
      background: rgba(0, 255, 102, 0.02);
      animation: var(--crt-flicker);
    }

    .dos-block {
      border: 1px solid var(--dos-border);
      padding: 15px;
      margin-bottom: 15px;
      background: rgba(0, 255, 102, 0.03);
    }

    .topbar-line {
      /* flex-direction: column; align-items: flex-start; */
      display: flex;          /* 啟用 Flexbox 佈局 */
      flex-wrap: wrap;        /* 空間不足時允許換行 */
      justify-content: space-between; /* 關鍵：將子元素平均分配，首尾貼齊邊框 */
      align-items: center;    /* 垂直置中對齊 */
    }
    .topbar {
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--dos-border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--dos-border);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .line-label {
      font-weight: bold;
      margin-bottom: 8px;
      display: block;
      color: var(--dos-fg-soft);
    }

    /* 按鈕樣式優化 */
    .btn {
      background: transparent;
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 12px 20px;
      font: inherit;
      cursor: pointer;
      text-shadow: 0 0 4px currentColor;
      transition: none;
      display: inline-block;
      text-align: center;
      text-decoration: none;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .btn:hover, .btn:active {
      background: var(--dos-invert-bg);
      color: var(--dos-invert-fg);
      text-shadow: none;
    }

    .text-input {
      background: rgba(0, 255, 102, 0.1);
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 10px;
      font: inherit;
      outline: none;
      width: 100%;
      max-width: 300px;
      margin-bottom: 10px;
    }

    .filename {
      color: var(--dos-fg-dim);
      font-size: 0.9rem;
      margin-top: 5px;
    }

    #status {
      margin-top: 10px;
      padding: 5px 10px;
      display: inline-block;
      border: 1px dashed var(--dos-border);
    }

    .blink::after {
      content: "_";
      animation: blink-anim 1s step-start infinite;
    }
    @keyframes blink-anim { 50% { opacity: 0; } }

    /* 預覽區域 */
    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    canvas {
      border: 1px solid var(--dos-border);
      max-width: 100%;
      height: auto !important;
      background: #111;
      box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
    }

    .hidden-input { display: none; }

    @media (max-width: 600px) {
      .text-input { max-width: 100%; }
      .btn { width: 100%; margin-right: 0; }
    }
    


    .brand {
      font-weight: bold;
      letter-spacing: 1px;
    }
    .subtitle {
      color: var(--dos-fg-soft);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar dos-block">
      <div class="topbar-line">
        <span class="brand">© NINS / REZOOM.SYS [2026.04.04]</span>
        <span class="subtitle">CHANGE PIXEL SIZE</span>
      </div>
    </div>
    
    <div class="dos-block">
      <!--h1>© nins. / REZOOM.SYS (PNG S-RENDER v2.5)</h1!-->
      <div class="line-label">C:\> SELECT IMAGE SOURCE</div>
      <button class="btn" id="selectBtn">[ F1 ] SELECT FILE</button>
      <input type="file" id="upload" class="hidden-input" accept="image/*" />
      <div class="filename" id="filename">STATUS: NO_FILE_LOADED</div>
    </div>

    <div class="dos-block">
      <div class="line-label">C:\> CONFIG_RENDER_SIZE (PX)</div>
      <input type="number" id="sizeInput" class="text-input" value="512" min="1" />
      <button class="btn" id="convertBtn">[ F2 ] RUN_CONVERSION</button>
      <div id="status" class="blink">SYSTEM_READY</div>
    </div>

    <div class="dos-block" id="outputArea" style="display:none;">
      <div class="line-label">C:\> OUTPUT_CHANNELS</div>
      <div id="downloads"></div>
      <div class="preview-grid" id="preview"></div>
    </div>

    <!--div class="dos-block">
      <a href="/" class="btn" style="border-style: dotted;">[ ESC ] RETURN_TO_INDEX</a>
    </div!-->

  </div>

  <script>
    const upload = document.getElementById("upload");
    const selectBtn = document.getElementById("selectBtn");
    const convertBtn = document.getElementById("convertBtn");
    const sizeInput = document.getElementById("sizeInput");
    const preview = document.getElementById("preview");
    const downloads = document.getElementById("downloads");
    const status = document.getElementById("status");
    const filename = document.getElementById("filename");
    const outputArea = document.getElementById("outputArea");

    let imageFile = null;

    selectBtn.addEventListener("click", () => upload.click());

    upload.addEventListener("change", (e) => {
      imageFile = e.target.files[0];
      preview.innerHTML = "";
      downloads.innerHTML = "";
      outputArea.style.display = "none";
      if (imageFile) {
        filename.textContent = `FILE: ${imageFile.name.toUpperCase()}`;
        status.textContent = `FILE_LOADED_OK`;
      }
    });

    convertBtn.addEventListener("click", () => {
      if (!imageFile) {
        status.textContent = "ERROR: NO_INPUT_FILE";
        return;
      }
      const size = parseInt(sizeInput.value, 10);
      if (!size || size <= 0) return;

      preview.innerHTML = "";
      downloads.innerHTML = "";
      outputArea.style.display = "block";
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = size;
          canvas.height = size;
          
          preview.appendChild(canvas);

          const imgRatio = img.width / img.height;
          let sx, sy, sWidth, sHeight;
          if (imgRatio > 1) {
            sHeight = img.height; sWidth = img.height;
            sx = (img.width - sWidth) / 2; sy = 0;
          } else {
            sWidth = img.width; sHeight = img.width;
            sx = 0; sy = (img.height - sHeight) / 2;
          }

          const rows = 5, cols = 5;
          const blockS = sWidth / cols;
          const blockD = size / cols;
          let index = 0;

          function drawNext() {
            if (index >= rows * cols) {
              const pngUrl = canvas.toDataURL("image/png");
              const link = document.createElement("a");
              link.href = pngUrl;
              link.className = "btn";
              link.download = `nins_rezoom_${Date.now()}_${size}x${size}.png`;
              link.textContent = `[ F3 ] DOWNLOAD_${size}X${size}.PNG`;
              downloads.appendChild(link);
              status.textContent = `RENDER_COMPLETE`;
              return;
            }
            const col = index % cols;
            const row = Math.floor(index / cols);
            ctx.drawImage(img, sx + (col * blockS), sy + (row * blockS), blockS, blockS, col * blockD, row * blockD, blockD, blockD);
            status.textContent = `SECTOR_RENDER: ${index + 1}/25`;
            index++;
            setTimeout(drawNext, 40); 
          }

          drawNext();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(imageFile);
    });
  </script>
</body>
</html>
