<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="© 2024 NINS (by JPGT). By using any of the services, it means you have agreed to any content and all content!">
  <link rel="canonical" href="https://copyright.nins.cc/">
  <title translate="no">nins / rezoom.sys</title>
  <style>
    body {
      background: #000;
      color: #00ff00;
      font-family: "Courier New", Courier, monospace;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }

    .terminal {
      max-width: 960px;
      margin: auto;
      border: 2px solid #00ff00;
      padding: 20px;
      box-shadow: 0 0 20px #00ff00;
      background: #000;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      text-transform: uppercase;
      border-bottom: 1px solid #00ff00;
      padding-bottom: 10px;
    }

    .line {
      margin: 12px 0;
    }

    .btn {
      background: #000;
      color: #00ff00;
      border: 2px solid #00ff00;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      display: inline-block;
    }

    .btn:hover {
      background: #00ff00;
      color: #000;
    }

    .hidden-input {
      display: none;
    }

    .text-input {
      background: #000;
      color: #00ff00;
      border: 2px solid #00ff00;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      width: 140px;
      outline: none;
    }

    .preview, .downloads {
      margin-top: 20px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .preview-item, .download-item {
      border: 1px solid #00ff00;
      padding: 10px;
      text-align: center;
      background: #050505;
    }

    canvas {
      display: block;
      background: #111;
      margin: 0 auto 8px;
      border: 1px solid #00ff00;
    }

    a {
      color: #00ff00;
      text-decoration: none;
      border: 1px solid #00ff00;
      padding: 8px 12px;
      display: inline-block;
    }

    a:hover {
      background: #00ff00;
      color: #000;
    }

    .status {
      margin-top: 15px;
      color: #00ff00;
      min-height: 24px;
    }

    .blink::after {
      content: "_";
      animation: blink 1s step-start infinite;
    }

    .filename {
      margin-top: 10px;
      color: #00ff00;
    }

    .inline-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 10px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="terminal">
    <h1>PNG IMAGE CONVERTER v2.5 (S-RENDER)</h1>

    <div class="line">C:\> SELECT IMAGE FILE</div>
    <button class="btn" id="selectBtn">[ F1 ] [ SELECT FILE ]</button>
    <input type="file" id="upload" class="hidden-input" accept="image/*" />
    <div class="filename" id="filename">NO FILE SELECTED</div>

    <div class="line">C:\> ENTER OUTPUT SIZE (PX)</div>
    <div class="inline-group">
      <input type="number" id="sizeInput" class="text-input" placeholder="[ F1.5 ] e.g. 512" value="512" min="1" />
      <button class="btn" id="convertBtn">[ F2 ] [ RUN CONVERSION ]</button>
    </div>

    <div class="status blink" id="status">SYSTEM READY</div>

    <div class="line">C:\> REAL-TIME RENDER PREVIEW</div>
    <div class="preview" id="preview"></div>

    <div class="line">C:\> DOWNLOAD FILE</div>
    <div class="downloads" id="downloads"></div>
  </div>

  <script>
    const upload = document.getElementById("upload");
    const selectBtn = document.getElementById("selectBtn");
    const convertBtn = document.getElementById("convertBtn");
    const sizeInput = document.getElementById("sizeInput");
    const preview = document.getElementById("preview");
    const downloads = document.getElementById("downloads");
    const status = document.getElementById("status");
    const filename = document.getElementById("filename");

    let imageFile = null;

    selectBtn.addEventListener("click", () => {
      upload.click();
    });

    upload.addEventListener("change", (e) => {
      imageFile = e.target.files[0];
      preview.innerHTML = "";
      downloads.innerHTML = "";

      if (imageFile) {
        filename.textContent = `FILE: ${imageFile.name}`;
        status.textContent = `FILE LOADED: ${imageFile.name}`;
      } else {
        filename.textContent = "NO FILE SELECTED";
        status.textContent = "SYSTEM READY";
      }
    });

    convertBtn.addEventListener("click", () => {
      if (!imageFile) {
        status.textContent = "ERROR: NO IMAGE FILE SELECTED";
        return;
      }

      const size = parseInt(sizeInput.value, 10);
      if (!size || size <= 0) {
        status.textContent = "ERROR: INVALID OUTPUT SIZE";
        return;
      }

      // 清空舊內容
      preview.innerHTML = "";
      downloads.innerHTML = "";
      status.textContent = `INITIALIZING GPU BUFFER...`;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          // 1. 建立 Canvas 並設定預覽大小
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = size;
          canvas.height = size;
          
          const displaySize = Math.min(size, 400); 
          canvas.style.width = `${displaySize}px`;
          canvas.style.height = `${displaySize}px`;

          const previewBox = document.createElement("div");
          previewBox.className = "preview-item";
          previewBox.appendChild(canvas);
          preview.appendChild(previewBox);

          // 2. 計算正方形裁切座標 (置中)
          const imgRatio = img.width / img.height;
          let sx, sy, sWidth, sHeight;

          if (imgRatio > 1) {
            sHeight = img.height;
            sWidth = img.height;
            sx = (img.width - sWidth) / 2;
            sy = 0;
          } else {
            sWidth = img.width;
            sHeight = img.width;
            sx = 0;
            sy = (img.height - sHeight) / 2;
          }

          // 3. 25 格逐行顯示邏輯
          const rows = 5;
          const cols = 5;
          const blockS = sWidth / cols; // 原始圖片切分大小
          const blockD = size / cols;   // 畫布目標切分大小
          let index = 0;

          function drawNext() {
            if (index >= rows * cols) {
              // 繪製完成後產生下載連結
              const pngUrl = canvas.toDataURL("image/png");
              const downloadBox = document.createElement("div");
              downloadBox.className = "download-item";
              const link = document.createElement("a");
              link.href = pngUrl;
              link.download = `${size}x${size}.png`;
              link.textContent = `[ F3 ] [ DOWNLOAD ${size}x${size}.PNG ]`;
              downloadBox.appendChild(link);
              downloads.appendChild(downloadBox);
              
              status.textContent = `CONVERSION COMPLETE. FILE READY.`;
              return;
            }

            const col = index % cols;
            const row = Math.floor(index / cols);

            ctx.drawImage(
              img,
              sx + (col * blockS), sy + (row * blockS), blockS, blockS,
              col * blockD, row * blockD, blockD, blockD
            );

            status.textContent = `WRITING SECTOR: ${index + 1}/25...`;
            index++;
            setTimeout(drawNext, 100); // 100ms 顯示一格
          }

          drawNext();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(imageFile);
    });
  </script>
</body>
</html>
