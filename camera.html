<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="© 2024 NINS (by JPGT). By using any of the services, it means you have agreed to any content and all content!" />
  <link rel="canonical" href="https://copyright.nins.cc/" />
  <title translate="no">nins / camera.sys</title>

  <style>
    :root {
      --dos-bg: #000000;
      --dos-fg: #00ff66;
      --dos-fg-soft: #66ff99;
      --dos-fg-dim: #4dbd74;
      --dos-invert-bg: #00ff66;
      --dos-invert-fg: #000000;
      --dos-border: #00ff66;
      --crt-flicker: flicker 0.15s infinite;
    }

    * { box-sizing: border-box; }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      5%   { opacity: 0.99; }
      10%  { opacity: 0.98; }
      100% { opacity: 0.99; }
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dos-bg);
      color: var(--dos-fg);
      font-family: "Courier New", Consolas, Monaco, monospace;
      text-shadow: 0 0 4px currentColor;
      min-height: 100%;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 9999;
      opacity: 0.18;
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      border: 2px solid var(--dos-border);
      background: rgba(0, 255, 102, 0.02);
      animation: var(--crt-flicker);
    }

    .dos-block {
      border: 1px solid var(--dos-border);
      padding: 15px;
      margin-bottom: 15px;
      background: rgba(0, 255, 102, 0.03);
    }

    .topbar-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .topbar {
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--dos-border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
    }

    .line-label {
      font-weight: bold;
      margin-bottom: 8px;
      display: block;
      color: var(--dos-fg-soft);
    }

    .btn {
      background: transparent;
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 12px 20px;
      font: inherit;
      cursor: pointer;
      text-shadow: 0 0 4px currentColor;
      transition: none;
      display: inline-block;
      text-align: center;
      text-decoration: none;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .btn:hover, .btn:active {
      background: var(--dos-invert-bg);
      color: var(--dos-invert-fg);
      text-shadow: none;
    }

    .text-input {
      background: rgba(0, 255, 102, 0.1);
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 10px;
      font: inherit;
      outline: none;
      width: 100%;
      max-width: 300px;
      margin-bottom: 10px;
    }

    .filename {
      color: var(--dos-fg-dim);
      font-size: 0.9rem;
      margin-top: 5px;
    }

    #status {
      margin-top: 10px;
      padding: 5px 10px;
      display: inline-block;
      border: 1px dashed var(--dos-border);
    }

    .blink::after {
      content: "_";
      animation: blink-anim 1s step-start infinite;
    }
    @keyframes blink-anim { 50% { opacity: 0; } }

    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    canvas {
      border: 1px solid var(--dos-border);
      max-width: 100%;
      height: auto !important;
      background: #111;
      box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
    }

    .hidden-input { display: none; }

    @media (max-width: 600px) {
      .text-input { max-width: 100%; }
      .btn { width: 100%; margin-right: 0; }
    }
    
    .brand {
      font-weight: bold;
      letter-spacing: 1px;
    }
    .subtitle {
      color: var(--dos-fg-soft);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar dos-block">
      <div class="topbar-line">
        <span class="brand">© NINS / CAMERA.SYS [2026.04.07]</span>
        <span class="subtitle">ADAPTIVE ASPECT RATIO</span>
      </div>
    </div>
    
    <div class="dos-block">
      <div class="line-label">C:\> SELECT IMAGE SOURCE</div>
      <button class="btn" id="selectBtn">[ F1 ] SELECT FILE</button>
      <input type="file" id="upload" class="hidden-input" accept="image/*" capture="environment">
      <div class="filename" id="filename">STATUS: NO_FILE_LOADED</div>
    </div>

    <div class="dos-block">
      <div class="line-label">C:\> CONFIG_SHORT_SIDE_SIZE (PX)</div>
      <input type="number" id="sizeInput" class="text-input" value="256" min="1" />
      <button class="btn" id="convertBtn">[ F2 ] RUN_CONVERSION</button>
      <div id="status" class="blink">SYSTEM_READY</div>
    </div>

    <div class="dos-block" id="outputArea" style="display:none;">
      <div class="line-label">C:\> OUTPUT_CHANNELS</div>
      <div id="downloads"></div>
      <div class="preview-grid" id="preview"></div>
    </div>
  </div>

  <script>
const upload = document.getElementById("upload");
const selectBtn = document.getElementById("selectBtn");
const convertBtn = document.getElementById("convertBtn");
const sizeInput = document.getElementById("sizeInput");
const preview = document.getElementById("preview");
const downloads = document.getElementById("downloads");
const status = document.getElementById("status");
const filename = document.getElementById("filename");
const outputArea = document.getElementById("outputArea");

let imageFile = null;

// 生成指定格式的時間字串: 2026-04-07T01:49:59:149Z+08:00
function getFormattedTimestamp() {
  const now = new Date();
  const tzo = -now.getTimezoneOffset();
  const dif = tzo >= 0 ? '+' : '-';
  
  const pad = (num, length = 2) => String(num).padStart(length, '0');

  const datePart = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const timePart = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const msPart = pad(now.getMilliseconds(), 3);
  const tzPart = `${dif}${pad(Math.floor(Math.abs(tzo) / 60))}:${pad(Math.abs(tzo) % 60)}`;

  return `${datePart}T${timePart}:${msPart}Z${tzPart}`;
}

selectBtn.addEventListener("click", () => upload.click());

upload.addEventListener("change", (e) => {
  imageFile = e.target.files[0];
  preview.innerHTML = "";
  downloads.innerHTML = "";
  outputArea.style.display = "none";
  if (imageFile) {
    filename.textContent = `FILE: ${imageFile.name.toUpperCase()}`;
    status.textContent = `FILE_LOADED_OK`;

    convertBtn.click()  ///20260407_1124
  }
});

convertBtn.addEventListener("click", () => {
  if (!imageFile) {
    status.textContent = "ERROR: NO_INPUT_FILE";
    return;
  }
  const shortSideTarget = parseInt(sizeInput.value, 10);
  if (!shortSideTarget || shortSideTarget <= 0) return;

  preview.innerHTML = "";
  downloads.innerHTML = "";
  outputArea.style.display = "block";
  
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      // 1. 計算圖片縮放比例***
      let imgW, imgH;
      const ratio = img.width / img.height;
      if (img.width < img.height) {
        imgW = shortSideTarget;
        imgH = Math.round(shortSideTarget / ratio);
      } else {
        imgH = shortSideTarget;
        imgW = Math.round(shortSideTarget * ratio);
      }

      // 2. 邊框與文字參數設定
      const strokeWidth = 2;       // 固定邊框寬度  ///1
      const padding = 0;           // 圖片緊貼邊框
      const fontSize = 16;         // 固定字體大小
      const textMarginBottom = 0; // 文字距離底部邊框的間距  ///15  ///1
      const totalOffset = strokeWidth + padding;

      // 設定畫布總尺寸
      canvas.width = imgW + (totalOffset * 2);
      canvas.height = imgH + (totalOffset * 2);
      preview.appendChild(canvas);

      // 3. 繪製 DOS 背景與單線邊框
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#00ff66";
      ctx.lineWidth = strokeWidth;
      // 繪製單線邊框 (對齊線條中心以防裁切)
      ctx.strokeRect(strokeWidth/2, strokeWidth/2, canvas.width - strokeWidth, canvas.height - strokeWidth);

      // 4. 分塊渲染圖片主體
      const rows = 5, cols = 5;
      const blockSW = img.width / cols;
      const blockSH = img.height / rows;
      const blockDW = imgW / cols;
      const blockDH = imgH / rows;
      let index = 0;

      function drawNext() {
        if (index >= rows * cols) {
          const timestamp = getFormattedTimestamp();
          
          // 1. 設定目標比例 (例如文字佔圖片寬度的 70%)
          const targetWidthRatio = 0.7; 
          const targetPx = imgW * targetWidthRatio;

          // 2. 動態計算字體大小以符合比例
          // 先用 100px 作為基準測量長度
          ctx.font = `100px "Courier New", monospace`;
          const metrics = ctx.measureText(timestamp);
          const baseWidth = metrics.width;
          
          // 根據比例縮放出最終的 fontSize
          const fontSize = (targetPx / baseWidth) * 100;
          
          // 3. 套用計算出的字體大小
          ctx.font = `${fontSize}px "Courier New", monospace`;
          ctx.textAlign = "center";
          ctx.textBaseline = "bottom";

          // 4. 設定文字位置 (置中，距離底部邊框固定間距)
          const centerX = canvas.width / 2;
          ///const textMarginBottom = fontSize * 0.5; // 讓間距隨字體大小縮放，比較美觀
          const posY = canvas.height - strokeWidth - textMarginBottom;

          // 繪製陰影
          ctx.fillStyle = "black";
          ctx.fillText(timestamp, centerX + 1, posY + 1);
          
          // 繪製主色
          ctx.fillStyle = "#00ff66";
          ctx.fillText(timestamp, centerX, posY);
          
          // --- 後續下載邏輯 ---
          const pngUrl = canvas.toDataURL("image/png");
          // ... (其餘代碼不變)
          
          const link = document.createElement("a");
          link.href = pngUrl;
          link.className = "btn";
          link.download = `nins_camera_${Date.now()}.png`;
          ///link.textContent = `[ F3 ] DOWNLOAD_CENTERED.PNG`;
          link.textContent = `[ F3 ] DOWNLOAD_${imgW}X${imgH}.PNG`;
          downloads.appendChild(link);
          status.textContent = `RENDER_COMPLETE_CENTERED`;
          return;
        }
        
        const col = index % cols;
        const row = Math.floor(index / cols);
        
        /*
        ctx.drawImage(
          img, 
          col * blockSW, row * blockSH, blockSW, blockSH,
          totalOffset + (col * blockDW), totalOffset + (row * blockDH), blockDW, blockDH
        ); ##v0 */
        
        // 【核心修改】：在繪製目標寬度與高度時各 +1，消除物理縫隙
        ctx.drawImage(
          img, 
          col * blockSW, row * blockSH, 
          blockSW, blockSH, // 來源裁切不變
          totalOffset + (col * blockDW), 
          totalOffset + (row * blockDH), 
          blockDW + 1, // 目標寬度多給 1px 重疊
          blockDH + 1  // 目標高度多給 1px 重疊
        );

        status.textContent = `SECTOR_RENDER: ${index + 1}/25`;
        index++;
        setTimeout(drawNext, 30); 
      }

      drawNext();
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(imageFile);
});
  </script>
</body>
</html>
