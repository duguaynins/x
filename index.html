    <script>
            
        function randomAlphaString(length) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
            let result = "";
            for (let i = 0; i < length; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return result;
        }
        
        const params = new URLSearchParams(window.location.search);

        // --- 設定區 ---
        const apikey = 'ijFBLQ.BEpg4g:yqcH3sGhgGO77S5mV4pAKFiaSYXo4DoqXSZfvXp2c6A'; // 請替換成你的 API Key
        const userid = params.get("userid") || randomAlphaString(128);
        const roomid = params.get("roomid") || randomAlphaString(128);

        // 1. 初始化 Ably
        const ably = new Ably.Realtime({
            key: apikey,
            clientId: userid
        });

        // 2. 取得一個頻道 (Channel)
        const channel = ably.channels.get( roomid );

        ///const logElement = document.getElementById('log');
        const statusElement = document.getElementById('conn-status');

        // 監測連線狀態
        ably.connection.on('connected', () => {
            statusElement.innerText = '● Waiting';
            statusElement.style.color = 'orange';
        });

        // 3. 訂閱訊息 (Subscribe)
        channel.presence.enter({});  ///webRTC
        /*
        channel.subscribe('test-event', (message) => {  });
        channel.subscribe((message) => {
            const newMessage = document.createElement('p');
            newMessage.textContent = `[${message.clientId}]: ${message.data}`;
            logElement.appendChild(newMessage);
            logElement.scrollTop = logElement.scrollHeight; // 自動捲動到底部

        // 4. 發送訊息函數 (Publish)
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value;
            
            if (text.trim() !== "") {
                channel.publish('test-event', text);
                input.value = ''; // 清空輸入框
            }
        }

        // 監聽 Presence 變動（有人進、有人出、有人更新）
        let frist = null;
        channel.presence.subscribe((member) => {
            // 💡 每次狀態變動，我們就去「抓取」完整的成員清單
            channel.presence.get((err, members) => {
                if (err) {
                    console.error("[SYSTEM] error:", err);
                    return;
                }

                const totalUsers = members.length; // 這裡就是總人數！
                console.log(`[SYSTEM] members.length: ${totalUsers}`);
                console.log(`[SYSTEM] member.action: ${member.action} (member.clientId: ${member.clientId})`);
                console.log(`[SYSTEM] member.data: ${JSON.stringify(member.data)}`);
                if (member.action==="leave") { ably.close();return; }  ///讓第二個接續一起退出***

                // 判斷是否湊齊兩人
                if (frist===null) {
                    if (member.action==="enter") { frist = true; }
                    if (member.action==="present") { frist = false; }
                    if (frist===true) {
                        setupOfferSDP();
                    }
                    console.log(frist);
                }
                
                if (true) {
                    if (frist && member.data?.SDP?.type==="answer") { 
                        console.log("frist");
                        setupAnswerSDP(member.data.SDP);
                    } else if (!frist && member.data?.SDP?.type==="offer") { 
                        console.log("!frist");
                        setupAnswerSDP(member.data.SDP);
                    } else {  }
                }    
            });
        });
    </script>


    <script>
        const chatWindow = document.getElementById("chat-window");
        const textInput = document.getElementById("textInput");
        const fileInput = document.getElementById("fileInput");
        const remoteTyping = document.getElementById("remote-typing");
        const connStatus = document.getElementById("conn-status");

        let pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        let dataChannel;
        let incomingFiles = {};
        let localDescription = {};

        function appendMsg(content, isMe, type = 'text', fileId = null) {
            const div = document.createElement("div");
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            if (type === 'text') {
                div.innerText = content;
            } else {
                div.innerHTML = `<div class="file-card" id="file-${fileId}"><span>📄 ${content}</span>
                    <div class="progress-container"><div class="progress-bar"></div></div>
                    <a class="download-btn" style="display:none">DOWNLOAD</a></div>`;
            }
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        function markDisconnected(reason = "") {
                connStatus.innerText = "● End";
                connStatus.style.color = "gray";
                document.getElementById("fileBtn").disabled = true;
                document.getElementById("textInput").disabled = true;
                document.getElementById("sendBtn").disabled = true;
        }

        function setupPeerConnection(pc) {
            pc.onconnectionstatechange = () => {
                console.log("PC connectionState:", pc.connectionState);

                if (
                    pc.connectionState === "disconnected" ||
                    pc.connectionState === "failed" ||
                    pc.connectionState === "closed"
                ) {
                    markDisconnected("connectionState " + pc.connectionState);
                }
            };

            pc.oniceconnectionstatechange = () => {
                console.log("PC iceConnectionState:", pc.iceConnectionState);

                if (
                    pc.iceConnectionState === "disconnected" ||
                    pc.iceConnectionState === "failed" ||
                    pc.iceConnectionState === "closed"
                ) {
                    markDisconnected("iceConnectionState " + pc.iceConnectionState);
                }
            };
        }
        
        setupPeerConnection(pc);

        function setupDataChannel(channel) {
            dataChannel = channel;
            dataChannel.binaryType = 'arraybuffer';

            dataChannel.onopen = () => {
                connStatus.innerText = "● Connected";
                connStatus.style.color = "green";
            };

            dataChannel.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    
                    // 關鍵功能：處理即時打字預覽
                    if (msg.type === 'typing') {
                        remoteTyping.innerText = msg.data ? `LIVE> ${msg.data}` : "";
                    } 
                    else if (msg.type === 'chat') {
                        remoteTyping.innerText = "LIVE>"; // 送出後清空預覽
                        appendMsg(msg.data, false);
                    } 
                    else if (msg.type === 'file-start') {
                        const { id, name, size } = msg;
                        incomingFiles[id] = { name, size, buffer: [], received: 0 };
                        appendMsg(name, false, 'file', id);
                    }
                    return;
                }

                // 檔案傳輸邏輯
                const lastId = Object.keys(incomingFiles).pop();
                const fileTask = incomingFiles[lastId];
                if (fileTask) {
                    fileTask.buffer.push(event.data);
                    fileTask.received += event.data.byteLength;
                    const percent = (fileTask.received / fileTask.size) * 100;
                    const el = document.getElementById(`file-${lastId}`);
                    if (el) el.querySelector(".progress-bar").style.width = percent + "%";

                    if (fileTask.received >= fileTask.size) {
                        const blob = new Blob(fileTask.buffer);
                        const link = el.querySelector(".download-btn");
                        link.href = URL.createObjectURL(blob);
                        link.download = fileTask.name;
                        link.style.display = "block";
                        link.innerText = "💾";  ///💾🎁
                        delete incomingFiles[lastId];
                    }
                }
            };
        }

        // WebRTC 信令流程 (Offer/Answer)
        async function setupOfferSDP(inputs=null) {
            setupDataChannel(pc.createDataChannel("chat-room"));
            if (true) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                setTimeout(async () => {
                    ///prompt("Offer SDP:", JSON.stringify(pc.localDescription) );  ///發起人
                    localDescription = pc.localDescription;
                    ///channel.presence.enter({ SDP: localDescription });
                    await channel.presence.update({ SDP: localDescription });
                }, 500);  ///alert
            }
        }
        async function setupAnswerSDP(inputs=null) {
            ///const inputs = prompt("請貼上對方的 SDP:");
            ///if (!inputs) return;
            ///const sdp = JSON.parse(inputs);

            const sdp = inputs;
            await pc.setRemoteDescription(sdp);
            if (sdp.type === "offer") {
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                setTimeout(async () => {
                    ///prompt("Answer SDP:", JSON.stringify(pc.localDescription) );  ///被動人
                    localDescription = pc.localDescription;
                    ///channel.presence.enter({ SDP: localDescription });
                    await channel.presence.update({ SDP: localDescription });

                    ///channel.detach(); // 或 close / leave
                    ably.close();
                }, 500);  ///alert
            }
        }

        ///可以等待ABLY完成連線後再進行
        ///雙方先取得完整的SDP再交換
        pc.ondatachannel = (e) => setupDataChannel(e.channel);
        pc.onicecandidate = (e) => { if(e.candidate) console.log("ICE Candidate updated"); };

        document.getElementById("createOffer").onclick = async () => {
            await setupOfferSDP();
        };
        document.getElementById("handleSignaling").onclick = async () => {
            await setupAnswerSDP();
        };

        // --- 核心邏輯：監聽輸入事件 ---
        textInput.addEventListener("input", () => {
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(JSON.stringify({
                    type: 'typing',
                    data: textInput.value
                }));
            }
        });

        function sendText() {
            const val = textInput.value;
            if (!val || !dataChannel) return;
            dataChannel.send(JSON.stringify({ type: 'chat', data: val }));
            dataChannel.send(JSON.stringify({ type: 'typing', data: "" })); // 送出後清空對方的預覽
            appendMsg(val, true);
            textInput.value = "";
        }

        document.getElementById("sendBtn").onclick = sendText;
        textInput.onkeypress = (e) => { if(e.key === 'Enter') sendText(); };

        // 檔案發送 (保留進度)
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (!file || !dataChannel) return;
            const fileId = Date.now();
            appendMsg(file.name, true, 'file', fileId);
            dataChannel.send(JSON.stringify({ type: 'file-start', id: fileId, name: file.name, size: file.size }));
            
            const chunkSize = 16384;
            let offset = 0;
            const reader = new FileReader();
            reader.onload = (e) => {
                dataChannel.send(e.target.result);
                offset += e.target.result.byteLength;
                const el = document.getElementById(`file-${fileId}`);
                if (el) el.querySelector(".progress-bar").style.width = (offset / file.size) * 100 + "%";
                if (offset < file.size) readNext();
            };
            const readNext = () => reader.readAsArrayBuffer(file.slice(offset, offset + chunkSize));
            readNext();
            fileInput.value = "";
        };
    </script>
