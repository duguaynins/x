  <style>
    :root {
      --dos-bg: #000000;
      --dos-fg: #00ff66;
      --dos-fg-soft: #66ff99;
      --dos-fg-dim: #4dbd74;
      --dos-invert-bg: #00ff66;
      --dos-invert-fg: #000000;
      --dos-border: #00ff66;
      --danger: #ff5555;
      --warn: #ffff66;
      --crt-flicker: flicker 0.15s infinite;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    /* 設定所有連結的初始顏色為黃色 */
    a {
      color: #ffff00; /* 黃色 */
      text-decoration: underline; /* 增加底線，視覺上更像連結 */
      transition: color 0.2s; /* 增加顏色過渡動畫，看起來更順滑 */
    }

    /* 當滑鼠移過（懸停）時變為紅色 */
    a:hover {
      color: greenyellow; /* 紅色 #ff0000 */
      text-shadow: 0 0 8px greenyellow; /* 增加發光效果，符合你原本的 CRT 風格 #ff0000 */
    }

    /* 針對 [F3] 報告連結的專門美化（可選） */
    .line a {
      font-weight: bold;
    }

    @keyframes flicker {
      0% { opacity: 0.97; }
      5% { opacity: 0.99; }
      10% { opacity: 0.98; }
      100% { opacity: 0.99; }
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dos-bg);
      color: var(--dos-fg);
      font-family: "Courier New", Consolas, Monaco, monospace;
      text-shadow: 0 0 4px currentColor;
      height: 100%;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 9999;
      opacity: 0.12;
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px;
      border: 1px solid var(--dos-border);
      background: rgba(0, 255, 102, 0.02);
      display: flex;
      flex-direction: column;
      animation: var(--crt-flicker);
      gap: 10px;
    }

    .dos-block {
      border: 1px solid var(--dos-border);
      padding: 10px;
      background: rgba(0, 255, 102, 0.03);
    }

    .topbar {
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--dos-border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
    }

    .muted { color: var(--dos-fg-dim); font-size: 0.8rem; }
    .soft { color: var(--dos-fg-soft); }
    .danger { color: var(--danger); }
    .warn { color: var(--warn); }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 網址快選區：手機改為橫向滑動避免頁面拉得太長 */
    #url-slider {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      padding: 10px 5px;
      border-style: dashed;
      scrollbar-width: none; /* Firefox */
    }
    #url-slider::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    button, input[type="text"], a.shortcut-link {
      background: transparent;
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 12px;
      font: inherit;
      text-transform: uppercase;
      text-decoration: none;
      outline: none;
      min-height: 48px; /* 符合手機觸控規範 */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    #url-slider button {
      flex: 0 0 auto;
      width: auto;
      min-width: 120px;
      font-size: 0.75rem;
      padding: 8px 12px;
    }

    button:active {
      background: var(--dos-invert-bg);
      color: var(--dos-invert-fg);
    }

    input[type="text"] {
      width: 100%;
      text-transform: none;
      background: rgba(0, 255, 102, 0.05);
    }

    #content {
      user-select: text;
      flex: 1;
      min-height: 150px;
      overflow-y: auto;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.9rem;
      border-style: double;
    }

    .status-bar {
      font-size: 0.7rem;
      color: var(--dos-fg-dim);
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }

    dialog {
      background: #000;
      color: var(--dos-fg);
      border: 2px solid var(--dos-border);
      width: 90vw;
      max-height: 80vh;
    }

    @media (min-width: 768px) {
      .topbar { flex-direction: row; justify-content: space-between; }
      .input-row { flex-direction: row; }
      .menu { grid-template-columns: repeat(4, 1fr); }
    }

    .hidden { display: none !important; }
    .line { margin: 4px 0; display: block; }
  </style>
</head>

<script>

<script>
async function HuggingFaceAPI(inputs=null) {
  try {
    const { group, space, path, payload } = inputs;
    const baseUrl = `https://${group}-${space}.hf.space/${path}`;
    const response = await fetch(baseUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    return await response.json();
  } catch (err) {
    console.error(err);
    return {result: {confidences: null, label: `<a translate="no" href="mailto:duguaynins@gmail.com?subject=${encodeURIComponent(new Date().toISOString())}&body=${encodeURIComponent(err.stack)}">MAIL SUPPORT</a>` }};
  }
}

async function deurl(params) {
  const { url } = params;
  if (!url) { document.getElementById("input_msg").value = "https://nins.cc/"; return "???"; }
  const outputs = await HuggingFaceAPI({  ///HuggingFaces
    group: "duguaynins",
    space: "Server",
    path: "decode/url",
    payload: { inputs: url },
  });
  return outputs.result;
}

let stopFlag = null;
let okFlag = false;

function recheck(url) {
  try { new URL(url); return false; } catch (e) { return true; }
}

async function send() {
  document.getElementById("input_msg").value = document.getElementById("input_msg").value.trim();
  terminalPrint(`<div class="line">> INITIALIZING LINK TRACE...</div><div class="line soft">> CONTACTING ANALYSIS ENGINES...</div>`);
  setStatus('WORKING');

  const url = document.getElementById("input_msg").value;
  if (recheck(url)) {
    terminalPrint(`<div class="danger">ERROR: INVALID URL FORMAT</div><div class="line">EXPECTED: HTTPS://EXAMPLE.COM/</div><div class="line soft">INPUT: ${url || '(EMPTY)'}</div>`);
    setStatus('INPUT ERROR');
    return;
  }

  stopFlag = true;
  document.getElementById("input_qr").disabled = true;
  document.getElementById("input_msg").disabled = true;
  document.querySelectorAll('button').forEach(button => { button.disabled = true; });

  const lang = `${(navigator.language || navigator.userLanguage || "en-US")}. Content generation uses this language`;
  const task = `Carefully infomatoion Security Analysis for URLs`;
  const need = `URL is safe(🟢/🔴) ? Shows the recommended degrees of caution "(🟢/🔴)" when operating under zero-trust. Who provided the prompt. Check the domain owner and review the website content`;

  const msg = await deurl({ url });
  const rdap_in = `https://rdap.org/domain/${encodeURIComponent(getDomain(url))}`;
  const refer_in = await deurl({ url: rdap_in });

  const bynins = `This is the result of a URL redirect analysis. The analysis technology prompt is provided by "nins.cc"`;
  const risk = "https://safebrowsing.google.com/safebrowsing/report_phish/";
  const hint = "Users are advised to avoid using any unknown links";

  const prompt = `notice=${bynins}!\n---\nlang=${lang}.\ntask=${task}.\nneed=${need}.\nsumbit=${risk}.\nalarm=${hint}.\n---\ninput=${url}.\n---\nrdap=${JSON.stringify(refer_in)}.\n---\nhtml=${JSON.stringify(msg)}.\n---\nnotice=${bynins}!`;
  const openai = `https://chatgpt.com/?prompt=` + encodeURIComponent(prompt);
  const google = `https://www.google.com/search?udm=50&aep=1&aic=0&hl=${lang}&q=` + encodeURIComponent(prompt);
  const perple = `https://www.perplexity.ai/?q=` + encodeURIComponent(prompt);   ///xmsg or prompt

  terminalPrint(`> ${url}
    <span class="line soft">[ F3 ] <a target="_blank" rel="noopener noreferrer" href="${openai}">CHATGPT REPORT</a></span> 
    <span class="line soft">[ F3 ] <a target="_blank" rel="noopener noreferrer" href="${google}">GEMINI REPORT</a></span>
    <span class="line soft">[ F3 ] <a target="_blank" rel="noopener noreferrer" href="${perple}">PERPLEXITY REPORT</a></span>
  `);

  document.querySelectorAll('button').forEach(button => { button.disabled = false; });
  document.getElementById("input_msg").disabled = false;
  document.getElementById("input_qr").disabled = false;

  stopFlag = false;
  okFlag = true;
  setStatus('READY');

  setTimeout(function() {
    ///window.location.href = google;
  }, 2000);
}

document.getElementById("input_msg").addEventListener("focus", (event) => {
  if (stopFlag || okFlag) return;
  terminalPrint(`> READY FOR INPUT...`);
  setStatus('INPUT');
});

document.getElementById("input_msg").addEventListener("blur", () => {
  if (stopFlag || okFlag) return;
  terminalPrint(`> YOU MAY ALSO LOAD A QR / BARCODE IMAGE.`);
  setStatus('READY');
});

document.getElementById("input_msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>

<script>
const placeholders = [
  "HTTPS://GOOGLE.COM/",
  "HTTPS://NINS.CC/",
];

setInterval(() => {
  input.placeholder = placeholders[index];

<script src="https://copyright.nins.cc/children/0001/jsQR.min.js"></script>
<script>
document.getElementById('input_qr').addEventListener('change', function(e) {
  const canvas = document.getElementById('canvas_qr');
  const ctx = canvas.getContext('2d');
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      terminalPrint(`> IMAGE RECEIVED... DECODING...`);
      setStatus('SCANNING');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0, img.width, img.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);

      if (code) {
        terminalPrint(`> SCAN COMPLETE\n> QR CODE FOUND\n> PAYLOAD: <span class="soft">${code.data}</span>`);
        document.getElementById('input_msg').value = code.data;
        send();
      } else {
        terminalPrint(`<div class="danger">ERROR: NO VALID QR / BARCODE DETECTED.</div><div class="line">TRY A CLEARER IMAGE.</div>`);
        document.getElementById('input_msg').value = "***";
        setStatus('SCAN ERROR');
      }
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
});
</script>

<script src="https://cdn.jsdelivr.net/npm/tldts@7.0.19/dist/index.umd.min.js"></script>
<script>
function getHostname(url) {
  if (!/^https?:\/\//i.test(url)) return null;
  return new URL(url).hostname;
}

function getDomain(url) {
  if (!/^https?:\/\//i.test(url)) return null;
  return tldts.getDomain(url);
}

function UserReady() {
  const params = new URLSearchParams(window.location.search);
  document.getElementById("input_msg").value = params.get("data");
  if (!params.get("data")) return;
  setTimeout(function () { send() }, 2200);
}

document.addEventListener('click', function handler(event) {
  if (event.target.tagName === 'BUTTON') {
    UserReady();
  }
}, { once: true });
</script>
