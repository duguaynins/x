  <style>
    :root {
      --dos-bg: #000000;
      --dos-fg: #00ff66;
      --dos-fg-soft: #66ff99;
      --dos-fg-dim: #4dbd74;
      --dos-invert-bg: #00ff66;
      --dos-invert-fg: #000000;
      --dos-border: #00ff66;
      --dos-warning: #ffffff;
      --dos-warning-bg: #111111;
      /* 新增：統一的閃爍變數 */
      --crt-flicker: flicker 0.15s infinite;
    }

    * {
      box-sizing: border-box;
    }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      5%   { opacity: 0.99; }
      10%  { opacity: 0.98; }
      100% { opacity: 0.99; }
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dos-bg);
      color: var(--dos-fg);
      font-family: "Courier New", Consolas, Monaco, monospace;
      text-shadow: 0 0 4px currentColor;
      min-height: 100%;
    }

    /* 掃描線特效 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 9999;
      opacity: 0.18;
    }

    /* 統一區塊組件 */
    .dos-block {
      border: 1px solid var(--dos-border);
      padding: 10px;
      margin-bottom: 12px;
      background: rgba(0, 255, 102, 0.03);
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      border: 2px solid var(--dos-border);
      background: rgba(0, 255, 102, 0.02);
      /* 加入閃爍動畫 */
      animation: var(--crt-flicker);
    }

    .topbar {
      /* 套用 dos-block 邏輯 */
    }

    .topbar-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .subtitle {
      color: var(--dos-fg-soft);
      font-size: 0.95rem;
    }

    .dos-window {
      width: 100%;
      max-width: 700px;
      border: 2px solid #00ff66;
      padding: 20px;
      box-shadow: 0 0 20px #00ff66;
      background: #000;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      text-transform: uppercase;
      border-bottom: 1px solid #00ff66;
      padding-bottom: 10px;
    }

    .line {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      width: 100px;
      flex-shrink: 0;
    }

    input, button {
      flex: 1;
      background: #000;
      border: 1px solid #00ff66;
      color: #00ff66;
      padding: 10px;
      outline: none;
      font-size: 16px;

      width: 0;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px #000 inset !important;
      -webkit-text-fill-color: #00ff66 !important;
      border: 1px solid #00ff66 !important;
      caret-color: #00ff66 !important;
      transition: background-color 9999s ease-in-out 0s;
    }

    input:focus {
      box-shadow: 0 0 10px #00ff66;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #00ff66;
      margin-left: 4px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .btn-row {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    button {
      background: #000;
      color: #00ff66;
      border: 1px solid #00ff66;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 16px;
      text-transform: uppercase;
    }

    button:hover {
      background: #00ff66;
      color: #000;
    }

    .output {
      margin-top: 25px;
      border-top: 1px dashed #00ff66;
      padding-top: 15px;
      white-space: pre-wrap;  /* 將 pre-line 改為 pre-wrap 不要 pre */
      min-height: 80px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  
<!-- NINS ================================================== -->

<script src="https://copyright.nins.cc/children/0001/nins-cookie.js"></script>

  <div class="screen">

    <div class="topbar dos-block">
      <div class="topbar-line">
        <div class="brand" translate="no">© nins. / FOLLOW.SYS</div>
        <div class="subtitle">Follow nins.</div>
      </div>
    </div>

    <!--div class="hint">SYSTEM READY<span class="cursor"></span></div!-->

    <form id="dosForm">
      <!--div class="line">
        <label for="name">NAME></label>
        <input type="text" id="name" name="name" />
      </div!-->

      <div class="line">
        <label for="email">EMAIL></label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="line">
        <label for="emailto">EMAILTO></label>
        <input type="text" id="emailto" />
      </div>

      <div class="line">

        <input type="text" id="text" />

      <div class="line">
        <label for="webpush">WEBPUSH></label>
        <input type="text" id="webpush" required disabled />
      </div>

      <div class="line">
        <label for="submit">CTRL></label>
        <button type="submit" id="submit">ENTER</button>
        <button type="reset">CLEAR</button>

    </form>

    <!--div class="hint">SYSTEM READY<span class="cursor"></span></div!-->

    <div class="output" id="output">[WAITING FOR INPUT...]</div>
  </div>

  <script>
    ///const params = new URLSearchParams(window.location.search);
    ///const id = params.get('id');     // "123"
    document.getElementById("webpush").value = JSON.stringify( Cookies.get("webpush") );
    if (!Cookies.get("webpush")) {  }
    else {  }
    

    const form = document.getElementById("dosForm");
    const output = document.getElementById("output");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (window.location.protocol !== 'file:') {
        if (!form.checkValidity()) { return; }
        if (!Cookies.get("webpush")) { return; }
      }

      ///const name = document.getElementById("name").value.trim();  ///  NAME    : ${name}
      let email = document.getElementById("email").value.trim();
      let emailto = document.getElementById("emailto").value.trim();
      let text = document.getElementById("text").value.trim();
      let webpush = document.getElementById("webpush").value.trim();
      let webpushto = null;
      if (!emailto) { emailto = email; }

      clearInterval(waiting);
      if (window.location.protocol === 'file:') { output.textContent = "[ERROR] NOT FOLLOWING.";return; }

      const data =
`[DATA START]
  EMAIL   : ${email}
  EMAILTO : ${emailto}
  TEXT    : ${text}
  WEBPUSH : ${webpush}
[DATA END]\n`;
      output.textContent = data;
      ///output.textContent += `\n[DATA RECEIVED]`;

      
      (async () => {
        
        webpush = await getWebpush(email);
        if (webpush) {   pushAdmin(null, "nins/copyright", text, webpush); }
        if (!webpush) {  pushAdmin(null, "nins/copyright", "Welcome", Cookies.get("webpush")); output.textContent = "[ALARM] WILL FOLLOWING."; }


        webpushto = await getWebpush(emailto);
        if (webpushto) { pushAdmin(null, "nins/copyright", text, webpushto); }


        // 填入跳轉
        const nins = "duguaynins@gmail.com";
        const subject = email;
        const body = Cookies.get("webpush");///webpush;
        window.location.href = `mailto:${nins}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      
      })();


    });

    form.addEventListener("reset", function () {
      setTimeout(() => {
        output.textContent = "[WAITING FOR INPUT...]";
      }, 0);
    });

    const spinner = ["/", "-", "\\", "|"];
    let i = 0;
    let waiting = null;

    if (true) {
      setTimeout(() => {
        waiting = setInterval(() => {
          output.textContent = spinner[i];
          i = (i + 1) % spinner.length;
        }, 200);
      }, 500);
    }

    

  
    async function pushAdmin(members=null, title="nins/copyright", body="Welcome", admin=null) {
      // 以下為新增測試
      ///if (!admin || typeof admin!=="object") { admin = Cookies.get("webpush"); }
      ///if (!admin || typeof admin!=="object") { return; }

      ///console.log(admin);
      const payload = `{
      "data": {
          "title": "${title}",
          "body": "${body}"
      },
      "subscription": ${JSON.stringify([ admin ])}
      }`;
      
      ///console.log(payload);
      const inputs = { "inputs": payload };
      const outputs = await HuggingFaces({
          group: "duguaynins",
          space: "RedirectAPI",
          path: "webpush/ninscc",  ///embeddings/meta
          payload: inputs,
      }); 
      console.log(outputs);
    }

    async function getHash(message) {
        const msgUint8 = new TextEncoder().encode(message); // 轉換為 Uint8Array
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8); // 進行雜湊
        const hashArray = Array.from(new Uint8Array(hashBuffer)); // 轉換回 array
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join(''); // 轉 16 進位
        return hashHex;
    }

    async function getStatus(url) {
        try {
            const res = await fetch(url, { method: "HEAD" }); // 等 fetch 完成
            return res.status; // 直接回傳 HTTP 狀態碼
        } catch (err) {
            console.error("網路錯誤:", err);
            return null; // 無法取得狀態碼時回傳 null
        }
    }

    async function getResponse(url) {
        try {
            const res = await fetch(url, { method: "GET" }); // 等 fetch 完成
            return res; // 直接回傳 HTTP 狀態碼
        } catch (err) {
            console.error("網路錯誤:", err);
            return null; // 無法取得狀態碼時回傳 null
        }
    }

    async function getWebpush(email) {
        
        const hash = await getHash(email);
        const path = `webpush/${hash}/data.txt`;
        const url = `https://huggingface.co/datasets/duguaynins/dataset-v20260406/resolve/main/${path}`
        const response = await getResponse(url);
        const status = await response.status;
        const webpush_hash = await response.text();

        console.log("status:", status);
        console.log("webpush_hash:", webpush_hash);

        ///return status, webpush_hash;
        return webpush_hash;
    }
  </script>
