<!DOCTYPE html>
<html lang="en">
<head
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="© 2024 NINS (by JPGT). By using any of the services, it means you have agreed to any content and all content!" />
  <link rel="canonical" href="https://copyright.nins.cc/" />
  <title>nins / doZIP.sys</title>

  <style>
    :root {
      --dos-bg: #000000;
      --dos-fg: #00ff66;
      --dos-fg-soft: #66ff99;
      --dos-fg-dim: #4dbd74;
      --dos-invert-bg: #00ff66;
      --dos-invert-fg: #000000;
      --dos-border: #00ff66;
      --crt-flicker: flicker 0.15s infinite;
    }

    * {
      box-sizing: border-box;
    }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      5%   { opacity: 0.99; }
      10%  { opacity: 0.98; }
      100% { opacity: 0.99; }
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dos-bg);
      color: var(--dos-fg);
      font-family: "Courier New", Consolas, Monaco, monospace;
      text-shadow: 0 0 4px currentColor;
      height: 100%; /* 從 100vh 改為 100% */
      overflow: hidden;
    }

    /* 掃描線特效 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 9999;
      opacity: 0.18;
    }

    /* 主螢幕容器 */
    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%; /* 改為 100% 適應父層 */
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      border: 2px solid var(--dos-border);
      background: rgba(0, 255, 102, 0.02);
      display: flex;
      flex-direction: column;
      animation: var(--crt-flicker);
    }

    /* 統一區塊組件 */
    .dos-block {
      border: 1px solid var(--dos-border);
      padding: 12px;
      margin-bottom: 12px;
      background: rgba(0, 255, 102, 0.03);
    }

    .topbar {
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--dos-border);
    }

    .menu {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* 統一按鈕風格 */
    button {
      background: transparent;
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 8px 16px;
      font: inherit;
      cursor: pointer;
      text-transform: uppercase;
      transition: none;
    }

    button:hover {
      background: var(--dos-invert-bg);
      color: var(--dos-invert-fg);
      text-shadow: none;
    }

    /* 輸出終端區 */
    #output-container {
      flex: 1;
      overflow-y: auto;
      font-size: 1rem;
      line-height: 1.4;
      scrollbar-width: thin;
      scrollbar-color: var(--dos-fg) transparent;
    }

    #output-container::-webkit-scrollbar {
      width: 6px;
    }
    #output-container::-webkit-scrollbar-thumb {
      background: var(--dos-fg);
    }

    .info { color: var(--dos-fg-soft); }
    .success { color: #ffffff; font-weight: bold; background: rgba(0, 255, 102, 0.2); }
    .error { color: #ff5555; border: 1px solid #ff5555; padding: 2px 4px; }

    #hidden-input { display: none; }

    .status-bar {
      font-size: 0.85rem;
      color: var(--dos-fg-dim);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar dos-block">
      © nins. / DOZIP.SYS [Version 2026.04.04] - COMPRESSION UTILITY
    </div>

    <div class="menu dos-block">
      <button id="selectFilesBtn">[ F1 ] SELECT FILES</button>
      <button id="downloadZipBtn">[ F2 ] BUILD & DOWNLOAD</button>
      <input type="file" id="hidden-input" multiple />
    </div>

    <div id="output-container" class="dos-block">
      <div id="display-text">SYSTEM READY.<br>AWAITING_</div>
    </div>

    <div class="status-bar">
      <span>LOCATION: C:\NINS\X\DOZIP</span>
      <span>STATUS: LIFE</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const hiddenInput = document.getElementById("hidden-input");
    const selectFilesBtn = document.getElementById("selectFilesBtn");
    const downloadZipBtn = document.getElementById("downloadZipBtn");
    const displayText = document.getElementById("display-text");
    let selectedFiles = [];

    function log(msg, type = "info") {
      const line = document.createElement("div");
      line.className = type;
      line.innerHTML = `<span style="color:var(--dos-fg-dim)">></span> ${msg}`;
      displayText.appendChild(line);
      
      const container = document.getElementById("output-container");
      container.scrollTop = container.scrollHeight;
    }

    selectFilesBtn.addEventListener("click", () => hiddenInput.click());

    hiddenInput.addEventListener("change", () => {
      selectedFiles = Array.from(hiddenInput.files);
      if (selectedFiles.length) {
        log(`SELECTED_FILES: ${selectedFiles.length} ITEM(S) LOADED.`, "info");
        selectedFiles.forEach(f => {
          log(`  + ${f.name.toUpperCase()} (${(f.size / 1024).toFixed(1)} KB)`, "info");
        });
      }
    });

    downloadZipBtn.addEventListener("click", async () => {
      if (!selectedFiles.length) {
        log("ERROR: NO FILES TO COMPRESS.", "error");
        return;
      }
      
      log("INITIATING COMPRESSION SEQUENCE...", "info");

      try {
        const zip = new JSZip();
        for (const file of selectedFiles) {
          const buffer = await file.arrayBuffer();
          zip.file(file.name, buffer, {
            date: file.lastModified ? new Date(file.lastModified) : new Date()
          });
          log(`ADDING: ${file.name.toUpperCase()}... OK.`, "info");
        }

        const blob = await zip.generateAsync({
          type: "blob",
          compression: "DEFLATE"
        });

        const timestamp = Date.now();
        const fileName = `nins_${timestamp}.zip`;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();

        log(`SUCCESS: ARCHIVE GENERATED AS ${fileName}`, "success");
      } catch (err) {
        console.error(err);
        log("FATAL ERROR: COMPRESSION PROCESS ABORTED.", "error");
      }
    });
  </script>
</body>
</html>
