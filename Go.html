<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>專業 3D 圍棋盤</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #f2f2f2; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.95);
    font-family: sans-serif;
    z-index: 10;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .score-board {
    margin-top: 5px;
    font-size: 14px;
    color: #555;
  }
</style>
</head>

<body>
<div id="ui">
  <div id="info" style="font-weight: bold; font-size: 16px;">黑棋先手 ⚫</div>
  <div class="score-board">
    提子數 - 黑: <span id="captured-white">0</span> | 白: <span id="captured-black">0</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

// 圍棋標準 19x19 棋盤
const SIZE = 19;
const HALF = (SIZE - 1) / 2;

// 棋盤狀態：0=空, 1=黑棋, -1=白棋
let grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
// 儲存 3D 棋子物件的陣列，方便提子時移除
let pieceObjects = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));

let current = 1; // 1=黑, -1=白
let capturedByBlack = 0;
let capturedByWhite = 0;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf2f2f2);

  const aspect = window.innerWidth / window.innerHeight;
  camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
  updateCameraAspect(aspect);

  camera.position.set(0, 25, 0);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // 🟫 圍棋木質感棋盤
  const boardSize = SIZE + 0.5;
  const board = new THREE.Mesh(
    new THREE.PlaneGeometry(boardSize, boardSize),
    new THREE.MeshStandardMaterial({ color: 0xdcb469, roughness: 0.4 })
  );
  board.rotation.x = -Math.PI / 2;
  scene.add(board);

  // 💡 光照優化（讓棋子更有立體感）
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const light = new THREE.DirectionalLight(0xffffff, 0.8);
  light.position.set(10, 25, 10);
  scene.add(light);

  // 📏 繪製 19x19 網格線
  const lineMat = new THREE.LineBasicMaterial({ color: 0x222222 });
  for (let i = 0; i < SIZE; i++) {
    const p = i - HALF;
    // 縱線
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(p, 0.01, -HALF), new THREE.Vector3(p, 0.01, HALF)]),
      lineMat
    ));
    // 橫線
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-HALF, 0.01, p), new THREE.Vector3(HALF, 0.01, p)]),
      lineMat
    ));
  }

  // 🎯 繪製圍棋 9 個星位 (Star Points)
  const starPositions = [3, 9, 15];
  const starGeo = new THREE.CircleGeometry(0.12, 16);
  const starMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
  
  for (let x of starPositions) {
    for (let y of starPositions) {
      const star = new THREE.Mesh(starGeo, starMat);
      star.rotation.x = -Math.PI / 2;
      star.position.set(x - HALF, 0.015, y - HALF);
      scene.add(star);
    }
  }

  window.addEventListener("click", onClick);
  window.addEventListener("resize", resize);

  updateUI();
}

function onClick(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const hit = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, hit);

  const x = Math.round(hit.x + HALF);
  const y = Math.round(hit.z + HALF);

  if (!inBoard(x, y)) return;
  if (grid[x][y] !== 0) return; // 該位置已有棋子

  // 模擬落子
  grid[x][y] = current;
  
  // 圍棋核心邏輯：檢查提子
  let opponents = [-1, 1].filter(c => c !== current);
  let capturedTotal = 0;

  // 1. 檢查四周敵方棋子是否因這一手而沒氣被提
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (let [dx, dy] of dirs) {
    let nx = x + dx, ny = y + dy;
    if (inBoard(nx, ny) && grid[nx][ny] === -current) {
      let block = [];
      if (!hasLiberty(nx, ny, -current, block, new Set())) {
        // 敵方沒氣，執行提子！
        capturedTotal += block.length;
        block.forEach(([bx, by]) => removePiece(bx, by));
      }
    }
  }

  // 2. 檢查自殺點：如果沒提走任何人，且自己放下去也沒氣，就是自殺點（不允許落子）
  if (capturedTotal === 0) {
    let selfBlock = [];
    if (!hasLiberty(x, y, current, selfBlock, new Set())) {
      grid[x][y] = 0; // 撤銷落子
      alert("這是自殺點，不能落子！");
      return;
    }
  }

  // 3. 更新提子分數
  if (current === 1) capturedByBlack += capturedTotal;
  else capturedByWhite += capturedTotal;

  // 真正把 3D 棋子畫出來
  placePieceMesh(x, y, current);

  // 換手
  current *= -1;
  updateUI();
}

// 圍棋核心：使用 DFS (廣度/深度搜尋) 檢查棋塊是否有「氣」
function hasLiberty(x, y, color, block, visited) {
  const key = `${x},${y}`;
  if (visited.has(key)) return false;
  visited.add(key);
  block.push([x, y]);

  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  let foundLiberty = false;

  for (let [dx, dy] of dirs) {
    let nx = x + dx, ny = y + dy;
    if (inBoard(nx, ny)) {
      if (grid[nx][ny] === 0) {
        foundLiberty = true; // 發現鄰近有空位（有氣）
      } else if (grid[nx][ny] === color) {
        // 同色棋子，屬於同一個棋塊，遞迴檢查
        if (hasLiberty(nx, ny, color, block, visited)) {
          foundLiberty = true; 
        }
      }
    }
  }
  return foundLiberty;
}

function inBoard(x, y) {
  return x >= 0 && x < SIZE && y >= 0 && y < SIZE;
}

// 繪製棋子（圍棋子通常是扁平的雙凸透鏡狀，這裡用高精細度的 Cylinder 模擬）
function placePieceMesh(x, y, c) {
  const pieceGeo = new THREE.CylinderGeometry(0.44, 0.44, 0.18, 32);
  // 圍棋子黑白材質通常帶點微霧光澤
  const pieceMat = new THREE.MeshStandardMaterial({
    color: c === 1 ? 0x151515 : 0xfcfcfc,
    roughness: 0.2,
    metalness: 0.1
  });
  
  const piece = new THREE.Mesh(pieceGeo, pieceMat);
  piece.position.set(x - HALF, 0.09, y - HALF); // 稍微貼在棋盤上
  scene.add(piece);

  // 記錄起來，提子時才能刪除
  pieceObjects[x][y] = piece;
}

// 提子：將棋子從網格與 3D 場景中移除
function removePiece(x, y) {
  grid[x][y] = 0;
  if (pieceObjects[x][y]) {
    scene.remove(pieceObjects[x][y]);
    pieceObjects[x][y].geometry.dispose();
    pieceObjects[x][y].material.dispose();
    pieceObjects[x][y] = null;
  }
}

function updateUI() {
  document.getElementById("info").innerText = current === 1 ? "輪到黑棋 ⚫" : "輪到白棋 ⚪";
  document.getElementById("captured-white").innerText = capturedByBlack;
  document.getElementById("captured-black").innerText = capturedByWhite;
}

function updateCameraAspect(aspect) {
  const view = SIZE / 2 + 1; // 預留安全邊距
  if (aspect >= 1) {
    camera.left = -view * aspect;
    camera.right = view * aspect;
    camera.top = view;
    camera.bottom = -view;
  } else {
    camera.left = -view;
    camera.right = view;
    camera.top = view / aspect;
    camera.bottom = -view / aspect;
  }
  camera.updateProjectionMatrix();
}

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  const aspect = window.innerWidth / window.innerHeight;
  updateCameraAspect(aspect);
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>

</body>
</html>
