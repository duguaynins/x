  <style>
    :root {
      --dos-bg: #000000;
      --dos-fg: #00ff66;
      --dos-fg-soft: #66ff99;
      --dos-fg-dim: #4dbd74;
      --dos-invert-bg: #00ff66;
      --dos-invert-fg: #000000;
      --dos-border: #00ff66;
      --crt-flicker: flicker 0.15s infinite;
    }

    * { box-sizing: border-box; }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      5%   { opacity: 0.99; }
      10%  { opacity: 0.98; }
      100% { opacity: 0.99; }
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dos-bg);
      color: var(--dos-fg);
      font-family: "Courier New", Consolas, Monaco, monospace;
      text-shadow: 0 0 4px currentColor;
      min-height: 100%;
    }

    /* 完美的 CRT 掃描線特效 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 9999;
      opacity: 0.18;
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      border: 2px solid var(--dos-border);
      background: rgba(0, 255, 102, 0.02);
      animation: var(--crt-flicker);
    }

    /* 延續 camera.sys 的面板樣式 */
    .dos-block {
      border: 1px solid var(--dos-border);
      padding: 15px;
      margin-bottom: 15px;
      background: rgba(0, 255, 102, 0.03);
    }

    .topbar {
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--dos-border);
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    .line-label {
      font-weight: bold;
      margin-bottom: 8px;
      display: block;
      color: var(--dos-fg-soft);
    }

    /* 一模一樣的按鈕風格 */
    .btn {
      background: transparent;
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 12px 20px;
      font: inherit;
      cursor: pointer;
      text-shadow: 0 0 4px currentColor;
      display: inline-block;
      text-align: center;
      text-decoration: none;
      margin-right: 10px;
      margin-bottom: 10px;
      width: 100%; /* 手機優先 */
    }

    .btn:hover, .btn:active {
      background: var(--dos-invert-bg);
      color: var(--dos-invert-fg);
      text-shadow: none;
    }

    /* 符合 DOS 美學的輸入框 */
    .text-input {
      background: rgba(0, 255, 102, 0.1);
      color: var(--dos-fg);
      border: 1px solid var(--dos-border);
      padding: 10px;
      font: inherit;
      outline: none;
      width: 100%;
      margin-bottom: 10px;
      min-height: 50px;
    }

    /* 訊息顯示區：全展開設計 [引用自帳本偏好] */
    #output_display {
      border: 1px dashed var(--dos-border);
      min-height: 300px;
      padding: 10px;
      margin-top: 10px;
      font-size: 0.9rem;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
    }

    .status-msg {
      margin-top: 10px;
      color: var(--dos-fg-dim);
    }

    .blink::after {
      content: "_";
      animation: blink-anim 1s step-start infinite;
    }
    @keyframes blink-anim { 50% { opacity: 0; } }

    @media (min-width: 600px) {
      .btn { width: auto; }
      .text-input { max-width: 400px; }
    }
  </style>

async function HuggingFaceAPI(inputs=null) {
  // 20251205
  try {
    console.log(inputs);
    const { group, space, path, payload } = inputs;
    const baseUrl = `https://${group}-${space}.hf.space/${path}`;  ///"https://duguaynins-RedirectAPI.hf.space/path";

    const response = await fetch(baseUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await response.json();
    console.log(data);
    return data;
  
  } catch (err) {
    console.error(err);
    return {result: {confidences: null, label: `<a translate="no" href="mailto:duguaynins@gmail.com?subject=${encodeURIComponent( new Date().toISOString() )}&body=${encodeURIComponent( err.stack )}">mailto:duguaynins@gmail.com</a>` }};  ///escapeHtml(err.stack)
  }
}

async function generate(params) {  
  console.log('翻譯文本:', params);
  ///const system = document.getElementById("input_sys").value;
  ///const message = document.getElementById("input_msg").value;

  const { sys = system, usr = message, models } = params;
  if (!models) { return; }
  if (!sys) { return "sys?"; }
  if (!usr) { return "usr?"; }

  
  const inputs = { "inputs": {models:models, system:sys, user:usr} }
  const outputs = await HuggingFaceAPI({  ///HuggingFaces  ///HuggingFaceAPI
    group: "duguaynins",
    space: "Server",  ///MultipleLLMs  ///RedirectAPI
    path: "generate/llms",  ////run/predict, api/predict, predict, /queue/join
    payload: inputs,
  }); 

  console.log("INPUT:", inputs);
  console.log("OUTPUT:", outputs);
  ///return outputs.result.label;
  return outputs.result;
}


async function rewrite(params) { 
  console.log('頻道確認:', params);
  const { system, user, models } = params;
  if (!models) { return; }
  if (!user) { return "sys?"; }
  if (!system) { return "usr?"; }

  const inputs = { "inputs": { "system": system, "user": user, "user": user, "models": models  } };
  const outputs = await HuggingFaceAPI({
    group: "duguaynins",
    space: "Server",
    path: `generate/rewrite?system=${null}&user=${null}`,  ///embeddings/meta
    payload: inputs,
  }); 

  console.log("INPUT:", inputs);
  console.log("OUTPUT:", outputs);
  return outputs.result;///.label
}

async function init(tl="", sl="") {
  document.getElementById("languages").value = tl;  ///配合初始化的追加
  const intermediate = "en";
  const target = tl || document.getElementById("languages").value;
  const source = sl || navigator.language;
  document.getElementById("intermediate").innerText = "il: "+intermediate;  ///field
  document.getElementById("source").innerText = "tl: "+target;
  document.getElementById("target").innerText = "sl: "+source;
}init("en", "");  ///配合初始化的追加
